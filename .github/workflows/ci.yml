name: ControlTotal CI

on:
  push:
    branches:
      - develop
      - main
      - feature/**

  pull_request:
    branches:
      - develop
      - main

jobs:
  backend:
    name: Backend - Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: control_total
          POSTGRES_USER: controltotal
          POSTGRES_PASSWORD: controltotal123

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U controltotal -d control_total"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/control_total
      SPRING_DATASOURCE_USERNAME: controltotal
      SPRING_DATASOURCE_PASSWORD: controltotal123

      SPRING_FLYWAY_URL: jdbc:postgresql://localhost:5432/control_total
      SPRING_FLYWAY_USER: controltotal
      SPRING_FLYWAY_PASSWORD: controltotal123

    defaults:
      run:
        working-directory: services/control-total-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U controltotal; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Build Backend
        run: mvn clean verify

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build