name: ControlTotal CI

on:
  push:
    branches: [develop, main]

  pull_request:
    branches: [develop, main]

jobs:
  backend:
    name: Backend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/controltotal-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Backend
        run: mvn clean verify

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build Angular
        run: npm run build