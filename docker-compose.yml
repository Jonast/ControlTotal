version: "3.9"

services:

  postgres:
    image: postgres:17

    container_name: controltotal-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: control_total
      POSTGRES_USER: controltotal
      POSTGRES_PASSWORD: controltotal123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - controltotal-network

  pgadmin:
    image: dpage/pgadmin4:latest

    container_name: controltotal-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@controltotal.cl
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - controltotal-network

volumes:

  postgres_data:

networks:

  controltotal-network: