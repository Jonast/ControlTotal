spring:
  application:
    name: control-total-api

  datasource:
    url: jdbc:postgresql://localhost:5432/control_total
    username: controltotal
    password: controltotal123
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080