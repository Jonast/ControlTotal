<app-page-header
  title="Sucursales"
  subtitle="Administración de sucursales">
</app-page-header>

<app-page-toolbar
  placeholder="Buscar sucursal..."
  buttonText="Nueva Sucursal"
  (search)="onSearch($event)"
  (buttonClick)="onNew()">
</app-page-toolbar>

<app-data-table
  [columns]="columns"
  [columnLabels]="columnLabels"
  [data]="sucursales"
  (edit)="onEdit($event)"
  (remove)="onDelete($event)">
</app-data-table>
