<app-page-header
  [title]="isEdit ? 'Editar Empresa' : 'Nueva Empresa'"
  [subtitle]="isEdit ? 'Actualización de empresa' : 'Registro de empresa'">
</app-page-header>

<div class="form-container">

  <mat-card>

    <mat-card-content>

      <form
        [formGroup]="form"
        class="form-grid"
        (ngSubmit)="guardar()">

        <mat-form-field appearance="outline">

          <mat-label>Nombre Comercial</mat-label>

          <input
            matInput
            formControlName="nombreComercial">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>Razón Social</mat-label>

          <input
            matInput
            formControlName="razonSocial">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>RUT</mat-label>

          <input
            matInput
            formControlName="rut">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>Email</mat-label>

          <input
            matInput
            formControlName="email">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>Teléfono</mat-label>

          <input
            matInput
            formControlName="telefono">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>Logo</mat-label>

          <input
            matInput
            formControlName="logo">

        </mat-form-field>

        <div class="actions">

          <button
            mat-stroked-button
            type="button"
            (click)="cancelar()">

            Cancelar

          </button>

          <button
            mat-raised-button
            color="primary"
            type="submit">

            {{ isEdit ? 'Actualizar' : 'Guardar' }}

          </button>

        </div>

      </form>

    </mat-card-content>

  </mat-card>

</div>
