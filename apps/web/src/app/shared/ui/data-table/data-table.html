<table mat-table [dataSource]="data" class="table">

  @for(column of columns; track column){

    <ng-container [matColumnDef]="column">

      <th mat-header-cell *matHeaderCellDef>

        {{ columnLabels[column] }}

      </th>

      <td mat-cell *matCellDef="let row">

        {{ row[column] }}

      </td>

    </ng-container>

  }

  <ng-container matColumnDef="actions">

    <th mat-header-cell *matHeaderCellDef>

      Acciones

    </th>

    <td mat-cell *matCellDef="let row">

      <button
        mat-icon-button
        color="primary"
        (click)="edit.emit(row)">

        <mat-icon>edit</mat-icon>

      </button>

      <button
        mat-icon-button
        color="warn"
        (click)="remove.emit(row)">

        <mat-icon>delete</mat-icon>

      </button>

    </td>

  </ng-container>

  <tr mat-header-row *matHeaderRowDef="[...columns,'actions']"></tr>

  <tr mat-row *matRowDef="let row; columns:[...columns,'actions']"></tr>

</table>
